<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-container">
  <h1 id="title">C Quiz-2</h1>
     <div id="topicline" class="topic-select">
       <h3><label id="topiclabel" for="topic">Select Topic
       <select id="topic" name="topic"> 
       </select></label></h3>
     </div>
  
    <div id="question"></div> 
        <div id="answer" class="hidden"></div>
    
    <p id="explanation" class="hidden"></p>
    <button id="show-answer-btn" class="hidden">Show Answer</button>
    <button id="next-btn" class="hidden">Next</button>
    <button id="explain-btn" class="hidden">Explain</button>
  </div>

  <div id="result-box" class="hidden">
     
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<script src="scriptDesc.js"></script>
</body>
</html>
